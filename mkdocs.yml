site_name: Math, Logic, Etc.
site_description: Notes and exercises for math, logic, statistics, and probability.
site_url: https://koushikvikram.github.io/math-logic-etc/

docs_dir: docs
site_dir: site

exclude_docs: |
  .DS_Store

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

extra_css:
  - assets/stylesheets/mermaid-panzoom.css

extra_javascript:
  - https://unpkg.com/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js
  - assets/javascripts/mermaid-render-panzoom.js
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
